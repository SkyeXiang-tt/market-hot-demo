<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>我的关注</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--y:#FFE400;--yl:#FFF8D6;--r:#FF4D4F;--rb:#FFF0F0;--g:#52C41A;--gb:#F0FFF0;--bk:#1A1A1A;--g7:#666;--g5:#999;--g4:#B0B0B0;--g3:#D9D9D9;--g2:#E8E8E8;--g1:#F5F5F5;--w:#fff;--f:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;--m:'DM Mono',Menlo,monospace}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--f);background:#E8E4E0;display:flex;justify-content:center;align-items:center;min-height:100vh}
.phone{width:375px;height:812px;background:var(--w);border-radius:44px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 40px 100px rgba(0,0,0,.3),0 0 0 3px #1a1a1a,inset 0 0 0 1px rgba(255,255,255,.05)}
@media(max-width:420px){body{background:var(--w)}.phone{width:100vw;height:100dvh;border-radius:0;box-shadow:none}}

.status{height:44px;display:flex;align-items:center;justify-content:space-between;padding:14px 24px 0;font-size:15px;font-weight:600;flex-shrink:0}
.status .icons{display:flex;gap:5px;align-items:center}
.status .icons svg{width:16px;height:14px}

.navbar{display:flex;align-items:center;height:44px;padding:0 16px;flex-shrink:0}
.navbar .back{width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:none}
.navbar .back svg{width:18px;height:18px}
.navbar .title{flex:1;text-align:center;font-size:16px;font-weight:700;color:var(--bk);margin:0 8px}
.navbar .right{display:flex;gap:12px;align-items:center}
.navbar .right span{font-size:13px;color:var(--g7);cursor:pointer}
.navbar .right svg{width:18px;height:18px;color:var(--g5);cursor:pointer}

.filters{display:flex;gap:8px;padding:8px 16px;border-bottom:1px solid var(--g1);flex-shrink:0}
.chip{padding:5px 16px;border-radius:16px;font-size:12px;color:var(--g7);background:var(--g1);border:none;cursor:pointer;font-family:var(--f);font-weight:500}
.chip.on{background:var(--bk);color:var(--w);font-weight:600}

.overview{padding:8px 16px;font-size:12px;color:var(--g5);border-bottom:1px solid var(--g1);flex-shrink:0}
.overview .uc{color:var(--r);font-weight:600}
.overview .dc{color:var(--g);font-weight:600}

.thead{display:flex;padding:6px 16px;background:var(--g1);font-size:11px;color:var(--g5);flex-shrink:0}
.thead .c1{flex:1}.thead .c2{width:80px;text-align:right}.thead .c3{width:56px;text-align:right}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}

.trow{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--g1);cursor:pointer;transition:background .1s}
.trow:active{background:var(--g1)}
.trow .tn{flex:1;font-size:14px;font-weight:500;color:var(--bk);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trow .tp{width:80px;text-align:right;font-family:var(--m);font-size:13px;color:var(--bk)}
.trow .tc{width:56px;text-align:right;font-family:var(--m);font-size:12px;font-weight:500}
.up{color:var(--r)}.dn{color:var(--g)}
</style>
</head>
<body>
<div class="phone">
  <div class="status"><span>9:41</span><div class="icons"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.24 4.24 0 00-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg><svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg></div></div>

  <div class="navbar">
    <button class="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="title">我的关注</span>
    <div class="right">
      <span>编辑</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
  </div>

  <div class="filters" id="ff">
    <button class="chip on" onclick="flt('all',this)">全部</button>
    <button class="chip" onclick="flt('up',this)">涨</button>
    <button class="chip" onclick="flt('down',this)">跌</button>
  </div>

  <div class="overview">今日 <span class="uc">4涨</span> <span class="dc">2跌</span></div>

  <div class="thead"><span class="c1">热点宝贝</span><span class="c2">闲鱼价</span><span class="c3">涨跌</span></div>

  <div class="scroll" id="list"></div>
</div>

<script>
const data=[
  {n:'Nike Waffle One 小白鞋',p:'¥580',c:'+5.8%',u:1},
  {n:'Nintendo Switch',p:'¥1,850',c:'+8.2%',u:1},
  {n:'Cracle Coin IP限定宝盒',p:'¥380',c:'-3.2%',u:0},
  {n:'AirPods Pro 2',p:'¥1,050',c:'+3.5%',u:1},
  {n:'Labubu 毛绒公仔',p:'¥680',c:'+6.7%',u:1},
  {n:'iPhone 15 Pro',p:'¥6,800',c:'-2.1%',u:0},
];
function render(f){
  let d=data;
  if(f==='up')d=d.filter(x=>x.u);
  if(f==='down')d=d.filter(x=>!x.u);
  document.getElementById('list').innerHTML=d.map(x=>
    `<div class="trow"><span class="tn">${x.n}</span><span class="tp">${x.p}</span><span class="tc ${x.u?'up':'dn'}">${x.c}</span></div>`
  ).join('');
}
function flt(f,b){
  document.querySelectorAll('#ff .chip').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');render(f);
}
render('all');
</script>
</body>
</html>
