<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>商品详情页（主态）</title>
<style>
:root{
  --y:#FFD700;--yl:#FFF8E1;--r:#FF4D4F;--rb:#FFF1F0;--g:#52C41A;--gb:#F6FFED;
  --bk:#000000;--g7:#666;--g5:#999;--g4:#BBBBBB;--g3:#DDDDDD;--g2:#EEEEEE;--g1:#F5F5F5;--g50:#FAFAFA;--w:#fff;
  --f:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;--m:'SF Mono','DIN Alternate',Menlo,monospace;
  --fs-xs:10px;--fs-sm:11px;--fs-md:12px;--fs-base:13px;--fs-lg:14px;--fs-xl:15px;--fs-2xl:16px;--fs-4xl:20px;
  --space-xs:4px;--space-sm:6px;--space-md:8px;--space-base:12px;--space-lg:16px;--space-xl:20px;
  --radius-sm:4px;--radius-md:8px;--radius-lg:12px;--radius-full:999px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--f);background:#E8E8E8;display:flex;justify-content:center;align-items:center;min-height:100vh;-webkit-font-smoothing:antialiased}
.phone{width:375px;height:812px;background:var(--g1);border-radius:40px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25),0 0 0 2px #222}
@media(max-width:420px){body{background:var(--w)}.phone{width:100vw;height:100dvh;border-radius:0;box-shadow:none}}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--g1)}
.scroll::-webkit-scrollbar{display:none}

.hero{width:100%;height:340px;background:linear-gradient(155deg,#f5f0e8 0%,#e8e0d5 40%,#ddd3c5 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.hero .back-btn{position:absolute;top:52px;left:16px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;z-index:10;transition:all .2s}
.hero .back-btn:active{transform:scale(.9)}
.hero .back-btn svg{width:18px;height:18px;color:#fff}
.hero .status{position:absolute;top:0;left:0;right:0;height:44px;display:flex;align-items:center;justify-content:space-between;padding:12px 24px 0;font-size:var(--fs-lg);font-weight:600;color:#fff;z-index:10}
.hero .status .icons{display:flex;gap:5px;align-items:center}
.hero .status .icons svg{width:16px;height:14px;fill:#fff}
.hero .product-emoji{font-size:130px;filter:drop-shadow(0 8px 20px rgba(0,0,0,.1))}

.pinfo{padding:var(--space-lg);background:var(--w)}
.pinfo .price{font-family:var(--m);font-size:var(--fs-4xl);font-weight:700;color:var(--r);margin-bottom:var(--space-sm)}
.pinfo .title{font-size:var(--fs-lg);color:var(--bk);line-height:1.5;margin-bottom:var(--space-md)}
.pinfo .badges{display:flex;gap:var(--space-sm)}
.pinfo .badge{font-size:var(--fs-sm);padding:var(--space-xs) var(--space-base);border-radius:var(--radius-sm)}
.pinfo .badge-y{background:var(--yl);color:#B8860B;font-weight:600}
.pinfo .badge-g{background:var(--g1);color:var(--g7)}

.trend-card{margin:var(--space-md) var(--space-lg) var(--space-base);padding:var(--space-base);border:1px solid var(--g2);border-radius:var(--radius-md);background:var(--w);cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm)}
.trend-card:active{background:var(--g50);transform:translateY(1px)}
.trend-card .tc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-md)}
.trend-card .tc-label{font-size:var(--fs-md);font-weight:600;color:var(--bk);display:flex;align-items:center;gap:var(--space-sm)}
.trend-card .tc-dot{width:8px;height:8px;border-radius:50%;background:var(--y)}
.trend-card .tc-arrow{color:var(--g4);font-size:18px}
.trend-card .tc-chart{width:100%;height:52px;margin-bottom:var(--space-sm);border-radius:var(--radius-sm);overflow:hidden}
.trend-card .tc-chart canvas{width:100%;height:100%}
.trend-card .tc-footer{display:flex;justify-content:space-between;font-size:var(--fs-sm);color:var(--g5)}
.trend-card .tc-footer .val{font-family:var(--m);font-weight:500;color:var(--bk)}
.up{color:var(--r)}.dn{color:var(--g)}

.detail-sec{padding:var(--space-lg);background:var(--w);border-top:var(--space-md) solid var(--g1)}
.detail-sec .dt{font-size:var(--fs-lg);font-weight:600;color:var(--bk);margin-bottom:var(--space-md)}
.detail-sec .dd{font-size:var(--fs-base);color:var(--g7);line-height:2}
</style>
</head>
<body>
<div class="phone">
  <div class="scroll">
    <div class="hero">
      <div class="status"><span>9:41</span><div class="icons"><svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.24 4.24 0 00-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg><svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg></div></div>
      <button class="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="product-emoji">👟</span>
    </div>

    <div class="pinfo">
      <div class="price">¥399</div>
      <div class="title">Nike Waffle One 小白鞋 复古华夫饼跑鞋 男女同款 DC0481-100</div>
      <div class="badges">
        <span class="badge badge-y">正品鉴定</span>
        <span class="badge badge-g">7天无理由</span>
      </div>
    </div>

    <div class="trend-card">
      <div class="tc-hd"><div class="tc-label"><span class="tc-dot"></span>热点行情趋势</div><span class="tc-arrow">›</span></div>
      <div class="tc-chart"><canvas id="cv"></canvas></div>
      <div class="tc-footer"><span>近30日最低 <span class="val">¥350</span></span><span>近30日最高 <span class="val">¥580</span></span><span class="val up">↑5.8%</span></div>
    </div>

    <div class="detail-sec">
      <div class="dt">商品详情</div>
      <div class="dd">
        <p>品牌：Nike</p><p>型号：Waffle One</p><p>货号：DC0481-100</p><p>配色：White/Orange</p><p>鞋面材质：网布+绒面革</p><p>鞋底：华夫格橡胶外底</p><p>尺码：36-45</p><p>成色：全新</p>
      </div>
    </div>
    <div style="height:40px"></div>
  </div>
</div>

<script>
function genD(n,b,v){const d=[b];for(let i=1;i<n;i++)d.push(d[i-1]+(Math.random()-.46)*v);return d}
function drawC(cv,data,color){
  if(!cv)return;const ctx=cv.getContext('2d'),dpr=window.devicePixelRatio||1,r=cv.parentElement.getBoundingClientRect();
  cv.width=r.width*dpr;cv.height=r.height*dpr;cv.style.width=r.width+'px';cv.style.height=r.height+'px';
  ctx.scale(dpr,dpr);const w=r.width,h=r.height;ctx.clearRect(0,0,w,h);
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1,p=6;
  const pts=data.map((v,i)=>({x:(i/(data.length-1))*w,y:p+(1-(v-mn)/rng)*(h-p*2)}));
  ctx.beginPath();ctx.moveTo(pts[0].x,h);pts.forEach(pt=>ctx.lineTo(pt.x,pt.y));ctx.lineTo(pts[pts.length-1].x,h);ctx.closePath();
  const gr=ctx.createLinearGradient(0,0,0,h);gr.addColorStop(0,color+'20');gr.addColorStop(1,color+'02');ctx.fillStyle=gr;ctx.fill();
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){const xc=(pts[i-1].x+pts[i].x)/2,yc=(pts[i-1].y+pts[i].y)/2;ctx.quadraticCurveTo(pts[i-1].x,pts[i-1].y,xc,yc)}
  ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
  const last=pts[pts.length-1];ctx.beginPath();ctx.arc(last.x,last.y,3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
}
setTimeout(()=>drawC(document.getElementById('cv'),genD(20,420,20),'#FF4D4F'),50);
</script>
</body>
</html>
