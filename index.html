/* SVG 走势图 */
const TrendSVG=({pts,color="#FF4D4F"})=>{
  const min=Math.min(...pts),max=Math.max(...pts),range=max-min||1;
  const w=310,h=80,pad=8;
  const points=pts.map((v,i)=>{
    const x=pad+(i/(pts.length-1))*(w-pad*2);
    const y=h-pad-((v-min)/range)*(h-pad*2);
    return`${x},${y}`;
  }).join(" ");
  const gid="g"+Math.random().toString(36).slice(2,6);
  return(
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{display:"block"}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity="0.18"/><stop offset="100%" stopColor={color} stopOpacity="0"/>
      </linearGradient></defs>
      <polygon points={`${pad},${h-pad} ${points} ${w-pad},${h-pad}`} fill={`url(#${gid})`}/>
      <polyline points={points} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
};
